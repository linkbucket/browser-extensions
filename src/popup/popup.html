<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Linkbucket</title>

    <!-- Tom Select styles (local copy; no remote CDNs in MV3) -->
    <link rel="stylesheet" href="/vendor/tom-select/tom-select.min.css" />

    <!-- Existing popup styles -->
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <img src="/assets/images/skate-bucky.svg" alt="Linkbucket logo" />
    <h1>Save to Linkbucket</h1>

    <!-- Key entry form -->
    <form id="key-form" style="display:none;">
      <label for="accessKeyId">Access Key ID</label>
      <input
        type="text"
        id="accessKeyId"
        name="accessKeyId"
        spellcheck="false"
        autocorrect="off"
        autocapitalize="off"
        autocomplete="off"
        inputmode="none"
        required
      />
      <label for="secretKey">Secret Key</label>
      <input
        type="password"
        id="secretKey"
        name="secretKey"
        spellcheck="false"
        autocorrect="off"
        autocapitalize="off"
        autocomplete="off"
        inputmode="none"
        required
      />
      <div class="actions">
        <button type="submit">Save keys</button>
      </div>
    </form>

    <!-- URL save form -->
    <form id="url-form" style="display:none;">
      <label for="url">URL</label>
      <input
        type="url"
        name="url"
        id="url"
        pattern="https://.*"
        spellcheck="false"
        autocorrect="off"
        autocapitalize="off"
        required
      />

      <!-- New: Tags field -->
      <label for="tags">Tags</label>
      <select
        id="tags"
        name="tags[]"
        multiple
        placeholder="Add tags…"
        autocomplete="off"
      ></select>

      <div class="actions">
        <button id="resetKeys" type="button">Change API Keys</button>
        <button type="submit">Save link</button>
      </div>
    </form>

    <div id="result" class="small"></div>

    <!-- Tom Select library (local UMD build) -->
    <script src="/vendor/tom-select/tom-select.complete.min.js"></script>

    <!-- App logic -->
    <script type="module" src="popup.js"></script>
  </body>
</html>
