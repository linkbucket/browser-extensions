<!DOCTYPE html>
<html>
  <head>
    <style>
      body { font-family: Arial, sans-serif; width: 300px; padding: 10px; }
      input, button { width: 100%; margin-top: 10px; }
      #resetKeys { margin-top: 10px; font-size: 12px; background: none; border: none; color: blue; text-decoration: underline; cursor: pointer; }
    </style>
    <title>Linkbucket</title>
  </head>
  <body>
    <h3>Add to Linkbucket</h3>

    <!-- Key entry form -->
    <form id="key-form" style="display:none;">
      <label for="accessKeyId">Access Key ID:</label>
      <input type="text" id="accessKeyId" name="accessKeyId" placeholder="Enter your Access Key ID"/>
      <label for="secretKey">Secret Key:</label>
      <input type="password" id="secretKey" name="secretKey" placeholder="Enter your Secret Key"/>
      <button type="submit">Save Keys</button>
    </form>

    <!-- URL save form -->
    <form id="url-form" style="display:none;">
      <label for="url">Link</label>
      <input type="text" id="url" name="url"/>
      <button type="submit">Add link</button>
      <button id="resetKeys" type="button">Change API Keys</button>
    </form>

    <div id="result" class="small"></div>
    <script src="popup.js"></script>
  </body>
</html>
